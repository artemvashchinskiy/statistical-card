<!-- left_column.html -->

<section class="column section-column-left"> 
  <div class="column-left__fill"> 
    <div class="icon-heading">   
      <img
        src="img/left/icons/Icon.png"
        alt="Username"
        class="icon-heading__img"
        width="24"
        height="24"
      >  
      <h2 class="icon-heading__text">Username</h2> 
    </div> 

    <div class="switcher">
      <div class="switcher__items">
        <button class="switcher__item switcher__item--active">
          Favorites
        </button>
        <button class="switcher__item">
          Recently
        </button>
      </div>
      <ul class="switcher__list">
        <li class="switcher__list-item">Overview</li>
        <li class="switcher__list-item">Projects</li>
      </ul>
    </div>

    <div class="dashboards">
      <h2 class="dashboards__title">Dashboards</h2>
      <ul class="dashboards__list">
        <li class="dashboards__item dashboards__item--overview">
          <img
            src="img/left/icons/overview.png"
            alt=""
            class="dashboards__icon dashboards__icon--active"
            width="24"
            height="24"
          >
          <h3 class="dashboards__heading">Overview</h3>
        </li>
        <li class="dashboards__item dashboards__item--ecommerce">
          <img
            src="img/left/icons/dropdown.png"
            alt=""
            class="dashboards__icon dashboards__icon--left"
            width="16"
            height="16"
          >
          <img
            src="img/left/icons/pocket-icon.png"
            alt=""
            class="dashboards__icon"
            width="24"
            height="24"
          >
          <h3 class="dashboards__heading">eCommerce</h3>
        </li>
        <li class="dashboards__item dashboards__item--projects">
          <img
            src="img/left/icons/dropdown.png"
            alt=""
            class="dashboards__icon dashboards__icon--left"
            width="16"
            height="16"
          >
          <img
            src="img/left/icons/folder-icon.png"
            alt=""
            class="dashboards__icon"
            width="24"
            height="24"
          >
          <h3 class="dashboards__heading">Projects</h3>
        </li>
      </ul>
    </div>

    <nav class="pages">
      <h2 class="pages__title">Pages</h2>
      <ul class="pages__menu">
        <li class="pages__item pages__item--user-profile">
          <button class="pages__toggle" type="button">
            <img
              src="img/left/icons/dropdown.png"
              alt=""
              class="pages__icon pages__icon--left"
              width="16"
              height="16"
            >
            <img
              src="img/left/icons/user-icon.png"
              alt=""
              class="pages__icon"
              width="24"
              height="24"
            >
            <span class="pages__heading">User Profile</span>
          </button>
          <ul class="pages__list">
            <li class="pages__list-item">Overview</li>
            <li class="pages__list-item">Projects</li>
            <li class="pages__list-item">Campaigns</li>
            <li class="pages__list-item">Documents</li>
            <li class="pages__list-item">Followers</li>
          </ul>
        </li>
        <li class="pages__item pages__item--account">
          <button class="pages__toggle" type="button">
            <img
              src="img/left/icons/dropdown.png"
              alt=""
              class="pages__icon pages__icon--left"
              width="16"
              height="16"
            >
            <img
              src="img/left/icons/account-Icon.png"
              alt=""
              class="pages__icon"
              width="24"
              height="24"
            >
            <span class="pages__heading">Account</span>
          </button>
          <!-- future submenu -->
        </li>
        <li class="pages__item pages__item--corporate">
          <button class="pages__toggle" type="button">
            <img
              src="img/left/icons/dropdown.png"
              alt=""
              class="pages__icon pages__icon--left"
              width="16"
              height="16"
            >
            <img
              src="img/left/icons/corporate-Icon.png"
              alt=""
              class="pages__icon"
              width="24"
              height="24"
            >
            <span class="pages__heading">Corporate</span>
          </button>
        </li>
        <li class="pages__item pages__item--blog">
          <button class="pages__toggle" type="button">
            <img
              src="img/left/icons/dropdown.png"
              alt=""
              class="pages__icon pages__icon--left"
              width="16"
              height="16"
            >
            <img
              src="img/left/icons/blog-Icon.png"
              alt=""
              class="pages__icon"
              width="24"
              height="24"
            >
            <span class="pages__heading">Blog</span>
          </button>
        </li>
        <li class="pages__item pages__item--social">
          <button class="pages__toggle" type="button">
            <img
              src="img/left/icons/dropdown.png"
              alt=""
              class="pages__icon pages__icon--left"
              width="16"
              height="16"
            >
            <img
              src="img/left/icons/social-Icon.png"
              alt=""
              class="pages__icon"
              width="24"
              height="24"
            >
            <span class="pages__heading">Social</span>
          </button>
        </li>
      </ul>
    </nav>

  <div class="snow">
      <img
        src="img/left/icons/SnowUI-Logo.png"
        alt="SnowUI"
        class="snow__logo"
        width="75"
        height="20"
      >
    </div>
  </div>



</section>
